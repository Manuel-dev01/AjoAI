name: contracts

on:
  push:
    paths: ["contracts/**", ".github/workflows/contracts.yml"]
  pull_request:
    paths: ["contracts/**", ".github/workflows/contracts.yml"]

jobs:
  foundry:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        # libs (forge-std, openzeppelin) are vendored under contracts/lib — no submodules

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Forge fmt check
        run: forge fmt --check

      - name: Forge build
        run: forge build --sizes

      - name: Forge test
        run: forge test -vvv
